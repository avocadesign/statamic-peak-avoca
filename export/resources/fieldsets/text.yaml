title: 'Block: Text'
fields:
  -
    handle: heading
    field:
      type: text
      display: Heading
  -
    handle: sub_heading
    field:
      type: text
      display: 'Sub heading'
  -
    handle: article
    field: article.article
    config:
      validate:
        - required
  -
    handle: display_settings
    field:
      mode: toggle
      input_label: 'Show settings'
      type: revealer
      display: 'Display Settings'
      instructions: 'Set text and heading alignment'
  -
    handle: align
    field:
      options:
        -
          key: left
          value: Left
        -
          key: centre
          value: Centre
      type: button_group
      display: 'Align block'
      width: 50
      default: left
      if:
        display_settings: 'equals true'
  -
    handle: align_headings
    field:
      options:
        -
          key: left
          value: Left
        -
          key: centre
          value: 'Centre Headings'
        -
          key: centre-all
          value: 'Centre all text'
      type: button_group
      display: 'Align Text'
      width: 50
      if:
        display_settings: 'equals true'
        align: 'equals centre'
  -
    import: colour_scheme
