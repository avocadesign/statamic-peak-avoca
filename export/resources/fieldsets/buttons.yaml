title: 'Set: Buttons'
fields:
  -
    handle: buttons
    field:
      collapse: accordion
      fullscreen: false
      replicator_preview: false
      button_label: 'Add button'
      type: replicator
      display: Buttons
      actions: false
      sets:
        button:
          display: Button
          sets:
            button:
              display: Button
              image: null
              fields:
                -
                  import: button
  -
    handle: button_alignment
    field:
      options:
        -
          key: start
          value: Left
        -
          key: center
          value: Centre
        -
          key: end
          value: Right
      type: button_group
      display: 'Button Alignment'
      if:
        $parent.type: 'equals article'
