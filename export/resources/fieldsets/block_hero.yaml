title: 'Common: Hero'
fields:
  -
    handle: hero_type
    field:
      options:
        -
          key: simple
          value: Simple
        -
          key: hero
          value: Hero
      default: simple
      type: button_group
      display: 'Page header type'
      width: 50
  -
    handle: custom_page_title
    field:
      type: toggle
      display: 'Custom page title?'
      width: 50
  -
    handle: page_heading
    field:
      type: text
      display: 'Page Heading (h1)'
      if:
        custom_page_title: 'equals true'
  -
    handle: hero_image
    field:
      max_files: 1
      container: images
      type: assets
      display: 'Hero Image'
      if:
        hero_type: 'equals hero'
  -
    handle: page_lede
    field: common.text_basic
    config:
      display: 'Page Lede'
      always_save: true
      if:
        hero_type: 'contains_any simple,hero'
  -
    handle: buttons
    field: buttons.buttons
    config:
      if:
        hero_type: 'equals hero'
      always_save: true
