title: 'Block: Bard Content'
fields:
  -
    handle: article
    field:
      buttons:
        - h2
        - h3
        - h4
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
        - alignleft
        - aligncenter
        - alignright
        - lede
        - brand
        - bts_styles
        - bts_attributes
        - bts_hidden
      reading_time: true
      allow_source: true
      type: bard
      localizable: true
      display: Content
      replicator_preview: false
      container: files
      always_save: false
      remove_empty_nodes: trim
      smart_typography: true
      bts_styles:
        - lede
        - brand
      collapse: true
      sets:
        content:
          display: Content
          instructions: 'Content sets.'
          icon: text-formatting-initial-letter
          sets:
            buttons:
              display: Buttons
              instructions: 'Add one or multiple buttons.'
              icon: link
              image: buttons.jpeg
              fields:
                -
                  import: buttons
            pull_quote:
              display: 'Pull quote'
              instructions: 'Add a pull quote with an optional author.'
              icon: text-formatting-quotation
              image: pull-quote.jpeg
              fields:
                -
                  import: pull_quote
            table:
              display: Table
              instructions: 'Add a data table with headers, rows and columns.'
              icon: add-table
              image: table.jpeg
              fields:
                -
                  import: table
        media:
          display: Media
          instructions: "Sets with images or embeddable video's."
          icon: media-image-camera
          sets:
            image:
              display: Image
              instructions: 'Add a single image with an optional caption.'
              icon: hero-image-above-text
              image: image.jpeg
              fields:
                -
                  import: image
            video:
              display: Video
              instructions: 'Add a YouTube or Vimeo video with an optional caption.'
              icon: movie-video-clip
              image: video.jpeg
              fields:
                -
                  import: video
            two_images:
              display: 'Two Images'
              instructions: 'Two images, side by side'
              icon: media-image-picture-gallery
              fields:
                -
                  import: two_images
